<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}User Dashboard - Brain Tumor Detection{% endblock %}</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Animate.css for animations -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom Style -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- User Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/user_dashboard">
        <i class="bi bi-person-circle me-2"></i>User Portal
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="adminNavbar">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link{% if request.path == '/user_dashboard' %} active{% endif %}" href="/user_dashboard">
              <i class="bi bi-house me-1"></i> Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link{% if request.path == '/user/prediction' %} active{% endif %}" href="/user/prediction">
              <i class="bi bi-activity me-1"></i> Prediction
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link{% if request.path == '/user/faq' %} active{% endif %}" href="/user/faq">
              <i class="bi bi-question-circle me-1"></i> FAQ
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link{% if request.path == '/user/health-tips' %} active{% endif %}" href="/user/health-tips">
              <i class="bi bi-heart-pulse me-1"></i> Health Tips
            </a>
          </li>
          <li class="nav-item ms-lg-3">
            <a class="btn btn-light rounded-pill px-4 fw-bold text-dark" href="/userlogout">
              <i class="bi bi-box-arrow-right me-1"></i> Logout
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    {% block content %}{% endblock %}
  </div>

  <!-- Footer -->
  <footer class="text-center">
    <div class="container py-4">
        &copy; 2026 User - Brain Tumor Detection. All rights reserved.
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
