{% extends "Admin/AdminBase.html" %}
{% block title %}Edit User - Admin Portal{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="premium-card fade-in-up">
        <div class="text-center mb-4">
            <div class="feature-icon-wrapper mx-auto mb-3">
                <i class="bi bi-person-gear"></i>
            </div>
            <h3 class="fw-bold" style="color:var(--primary-color);">Edit User Profile</h3>
            <p class="text-muted small">Update patient information below</p>
        </div>

        <div class="card-body">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-bold small text-uppercase opacity-75">Username</label>
              <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold small text-uppercase opacity-75">Email Address</label>
              <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold small text-uppercase opacity-75">Mobile Number</label>
              <input type="text" name="mobile" class="form-control" value="{{ user.mobile }}" required>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-premium py-3 rounded-pill shadow-sm">Save Changes</button>
              <a href="{{ url_for('admin_users') }}" class="btn btn-outline-secondary border-0 text-decoration-none small mt-2">Cancel and Return</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
