{% extends "Admin/AdminBase.html" %}
{% block title %}{{ action }} Health Tip - Admin Portal{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="premium-card fade-in-up">
        <div class="text-center mb-4">
            <div class="feature-icon-wrapper mx-auto mb-3">
                <i class="bi bi-heart-pulse"></i>
            </div>
            <h3 class="fw-bold" style="color:var(--primary-color);">{{ action }} Health Tip</h3>
            <p class="text-muted small">Provide valuable medical insights for patients</p>
        </div>

        <div class="card-body">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-bold small text-uppercase opacity-75">Tip Title</label>
              <input type="text" name="title" class="form-control border-black" value="{{ health_tip.title if health_tip else '' }}" placeholder="Enter a catchy title..." required>
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold small text-uppercase opacity-75">Tip Description</label>
              <textarea name="description" class="form-control border-black" rows="5" placeholder="Enter the detailed medical advice..." required>{{ health_tip.description if health_tip else '' }}</textarea>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-premium py-3 rounded-pill shadow-sm">{{ action }} Tip</button>
              <a href="{{ url_for('admin_health_tips') }}" class="btn btn-outline-secondary border-0 text-decoration-none small mt-2">Cancel and Return</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
