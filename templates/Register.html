{% extends "Base.html" %}
{% block title %}Register - Brain Tumor Detection{% endblock %}

{% block content %}

<section class="auth-section d-flex align-items-center" style="min-height: 100vh; padding: 60px 0;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-10 fade-in-up">
        
        <div class="login-card">
          {% if msg %}
            <div class="alert alert-{{ msg_type }} text-center rounded-pill mb-4 border-0 shadow-sm" style="font-size: 0.9rem;">
                <i class="bi bi-info-circle me-2"></i>{{ msg }}
            </div>
          {% endif %}

          <div class="text-center mb-5">
              <div class="feature-icon-wrapper mx-auto mb-4" style="width: 70px; height: 70px;">
                  <i class="bi bi-person-plus-fill" style="font-size: 2.5rem;"></i>
              </div>
              <h2 class="fw-bold h3 mb-2" style="color:var(--primary-color);">Create Account</h2>
              <p class="text-muted small">Join our community and start your journey with AI diagnostics</p>
          </div>

          <form method="post" action="/register">
            <div class="row">
                <div class="col-md-6 mb-4">
                  <label class="form-label fw-bold small text-uppercase opacity-75">Full Name</label>
                  <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-person"></i></span>
                      <input type="text" class="form-control px-3" name="username" placeholder="Enter here" required>
                  </div>
                </div>
                <div class="col-md-6 mb-4">
                  <label class="form-label fw-bold small text-uppercase opacity-75">Mobile Number</label>
                  <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-phone"></i></span>
                      <input type="tel" class="form-control px-3" name="mobile" pattern="[0-9]{10,15}" placeholder="Enter here" required>
                  </div>
                </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold small text-uppercase opacity-75">Email Address</label>
              <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email" class="form-control px-3" name="email" placeholder="Enter here" required>
              </div>
            </div>
            <div class="mb-5">
              <label class="form-label fw-bold small text-uppercase opacity-75">Create Password</label>
              <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-key"></i></span>
                  <input type="password" class="form-control px-3" name="password" placeholder="Enter here" required>
              </div>
            </div>
            <button type="submit" class="btn btn-premium w-100 py-3 shadow-lg rounded-pill mb-4">
                <i class="bi bi-check-circle me-2"></i>Register Now
            </button>
            <div class="text-center">
              <p class="small text-muted mb-0">Already have an account? <a href="/login" class="fw-bold text-decoration-none" style="color:var(--primary-color);">Login here</a></p>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</section>

{% endblock %}
