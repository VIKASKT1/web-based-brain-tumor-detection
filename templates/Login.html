{% extends "Base.html" %}
{% block title %}Login - Brain Tumor Detection{% endblock %}

{% block content %}

<section class="auth-section d-flex align-items-center" style="min-height: 100vh; padding: 60px 0;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-8 fade-in-up">
        
        <div class="login-card">
          {% if msg %}
            <div class="alert alert-{{ msg_type }} text-center rounded-pill mb-4 border-0 shadow-sm" style="font-size: 0.9rem;">
                <i class="bi bi-info-circle me-2"></i>{{ msg }}
            </div>
          {% endif %}

          <div class="text-center mb-5">
              <div class="feature-icon-wrapper mx-auto mb-4" style="width: 70px; height: 70px;">
                  <i class="bi bi-shield-lock-fill" style="font-size: 2.5rem;"></i>
              </div>
              <h2 class="fw-bold h3 mb-2" style="color:var(--primary-color);">Welcome Back</h2>
              <p class="text-muted small">Please enter your credentials to access the portal</p>
          </div>

          <!-- Nav Pills -->
          <ul class="nav nav-pills mb-5 justify-content-center bg-light p-1 rounded-pill" id="loginTabs" role="tablist">
            <li class="nav-item w-50" role="presentation">
              <button class="nav-link w-100 rounded-pill py-2 {% if active_tab != 'user' %}active{% endif %}" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin" type="button" role="tab">Admin</button>
            </li>
            <li class="nav-item w-50" role="presentation">
              <button class="nav-link w-100 rounded-pill py-2 {% if active_tab == 'user' %}active{% endif %}" id="user-tab" data-bs-toggle="tab" data-bs-target="#user" type="button" role="tab">User</button>
            </li>
          </ul>

          <!-- Tab Content -->
          <div class="tab-content">
            <!-- Admin Login -->
            <div class="tab-pane fade {% if active_tab != 'user' %}show active{% endif %}" id="admin" role="tabpanel">
              <form method="post" action="/admin-login">
                <div class="mb-4">
                  <label class="form-label fw-bold small text-uppercase opacity-75">Admin Username</label>
                  <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-person"></i></span>
                      <input type="text" class="form-control px-3" name="admin_username" placeholder="Enter here" required>
                  </div>
                </div>
                <div class="mb-5">
                  <label class="form-label fw-bold small text-uppercase opacity-75">Password</label>
                  <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-key"></i></span>
                      <input type="password" class="form-control px-3" name="admin_password" placeholder="Enter here" required>
                  </div>
                </div>
                <button type="submit" class="btn btn-premium w-100 py-3 shadow-lg rounded-pill">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login as Admin
                </button>
              </form>
            </div>

            <!-- User Login -->
            <div class="tab-pane fade {% if active_tab == 'user' %}show active{% endif %}" id="user" role="tabpanel">
              <form method="post" action="/user-login">
                <div class="mb-4">
                  <label class="form-label fw-bold small text-uppercase opacity-75">Email or Username</label>
                  <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                      <input type="text" class="form-control px-3" name="user_username" placeholder="Enter here" required>
                  </div>
                </div>
                <div class="mb-4">
                  <label class="form-label fw-bold small text-uppercase opacity-75">Password</label>
                  <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-key"></i></span>
                      <input type="password" class="form-control px-3" name="user_password" placeholder="Enter here" required>
                  </div>
                </div>
                <button type="submit" class="btn btn-premium w-100 py-3 shadow-lg rounded-pill mb-4">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login as User
                </button>
                <div class="text-center">
                  <p class="small text-muted mb-0">New to the platform? <a href="/register" class="fw-bold text-decoration-none" style="color:var(--primary-color);">Create Account</a></p>
                </div>
              </form>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

{% endblock %}
